name: 构建 BHTikTok++

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew update
          brew install ldid dpkg gnu-sed make
          echo "PATH=$(brew --prefix make)/libexec/gnubin:$PATH" >> $GITHUB_ENV

      - name: Set up Theos
        run: |
          THEOS="$HOME/theos"
          if [ ! -d "$THEOS/.git" ]; then
            git clone --recursive https://github.com/theos/theos.git "$THEOS"
          else
            git -C "$THEOS" submodule update --init --recursive || true
          fi
          if [ -d "$THEOS/sdks/.git" ]; then
            git -C "$THEOS/sdks" pull --ff-only
          else
            rm -rf "$THEOS/sdks"
            git clone https://github.com/theos/sdks.git "$THEOS/sdks"
          fi

      - name: Export THEOS env
        run: echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Sync region and locale resources
        run: |
          set -euo pipefail
          PROJECT_DIR="BHtiktok-2026"
          RES_DIR="$PROJECT_DIR/Resources"
          mkdir -p "$RES_DIR"
          if [ -d "_地区" ]; then
            mkdir -p "$RES_DIR/_地区"
            rsync -a --delete "_地区/" "$RES_DIR/_地区/"
          fi
          if [ -d "dist/_locales" ]; then
            mkdir -p "$RES_DIR/_locales"
            rsync -a --delete "dist/_locales/" "$RES_DIR/_locales/"
          fi

      - name: Fetch ISO 3166-2 dataset
        run: |
          set -euo pipefail
          mkdir -p BHtiktok-2026/Resources/_地区
          curl -L --fail https://raw.githubusercontent.com/olahol/iso-3166-2.json/master/iso-3166-2.json -o BHtiktok-2026/Resources/_地区/iso-3166-2.json

      - name: List resources
        run: |
          set -euo pipefail
          echo "Resources tree:" && find BHtiktok-2026/Resources -maxdepth 3 -type f -print || true

      - name: Build package
        run: |
          cd BHtiktok-2026 && make package

      - name: Verify resources inside package
        run: |
          set -euo pipefail
          PKG=$(ls BHtiktok-2026/packages/*.deb | head -n1)
          dpkg-deb -c "$PKG" | tee pkg_contents.txt
          if ! grep -E "Library/Application Support/BHTikTok/|zh-Hans\.lproj/Localizable\.strings|/_地区/iso-3166-2\.json|/_地区/|/_locales/" pkg_contents.txt > /dev/null; then
            echo "Missing language/region resources in package"
            exit 1
          fi

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: bhtiktok-deb
          path: BHtiktok-2026/packages/*.deb
