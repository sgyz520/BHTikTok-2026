name: Build BHTikTok++

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  tags:
    - 'v*'

jobs:
  build:
    runs-on: macos-latest
    env:
      THEOS: $HOME/theos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew update
          brew install ldid dpkg gnu-sed

      - name: Set up Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$THEOS"
          git clone https://github.com/theos/sdks.git "$THEOS/sdks"

      - name: Build package
        run: |
          make package

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: bhtiktok-deb
          path: packages/*.deb
